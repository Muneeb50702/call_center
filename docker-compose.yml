version: "3.8"

services:
  # ── Redis: Shared state across agent workers ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── TMS Backend: FastAPI mock database ──
  tms-backend:
    build:
      context: ./tms_backend
    ports:
      - "8001:8000"
    volumes:
      - ./tms_backend:/app
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Nexus Agent Worker: AI Dispatch Engine ──
  # LiveKit automatically load-balances calls across workers.
  # Each worker can handle ~20 concurrent calls.
  # Scale with: docker compose up --scale nexus-agent=3
  nexus-agent:
    build:
      context: ./nexus_agent
    volumes:
      - ./nexus_agent:/app
    env_file:
      - .env
    environment:
      - TMS_BASE_URL=http://tms-backend:8000
      - REDIS_URL=redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
      tms-backend:
        condition: service_healthy
    deploy:
      replicas: 1  # Scale to 3+ for production: docker compose up --scale nexus-agent=3
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

volumes:
  redis_data:
