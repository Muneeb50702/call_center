version: "3.8"

services:
  tms-backend:
    build:
      context: ./tms_backend
    ports:
      - "8001:8000"
    volumes:
      - ./tms_backend:/app
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  nexus-agent:
    build:
      context: ./nexus_agent
    volumes:
      - ./nexus_agent:/app
    env_file:
      - .env
    environment:
      - TMS_BASE_URL=http://tms-backend:8000
    depends_on:
      - tms-backend
    restart: unless-stopped
