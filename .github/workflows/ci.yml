name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx structlog livekit livekit-plugins-openai livekit-plugins-deepgram livekit-plugins-elevenlabs
        
    - name: Run Tests
      run: |
        export PYTHONPATH=./nexus_agent
        pytest nexus_agent/tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and Push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./tms_backend
        push: true
        tags: ghcr.io/${{ github.repository }}/nexus-backend:latest
        
    - name: Build and Push Agent
      uses: docker/build-push-action@v4
      with:
        context: ./nexus_agent
        push: true
        tags: ghcr.io/${{ github.repository }}/nexus-agent:latest
        
    - name: Build and Push Dashboard
      uses: docker/build-push-action@v4
      with:
        context: ./dashboard
        push: true
        tags: ghcr.io/${{ github.repository }}/nexus-dashboard:latest
