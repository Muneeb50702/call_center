worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting for API to prevent abuse
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream dashboard {
        server dashboard:3000;
    }

    upstream tms_backend {
        server tms-backend:8000;
    }

    server {
        listen 80;
        server_name _; # Change to actual domain in production

        # ── Next.js Dashboard ──
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend API ──
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://tms_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── LiveKit Webhook Endpoint ──
        location /webhook/livekit {
            proxy_pass http://tms_backend/webhook/livekit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
